server:
    port: 8086

spring:
    application:
        name: result-service

    datasource:
        url: jdbc:postgresql://localhost:5432/vote_resultdb
        username: postgres
        password: kigali45
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            ddl-auto: update

        show-sql: true

        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
                format_sql: true

    kafka:
        consumer:
            group-id: result-group
            auto-offset-reset: earliest

            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

            value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

            properties:
                spring.json.trusted.packages: com.online.voting.events

    cloud:
        function:
            definition: voteCasted;electionClosed

        stream:
            bindings:
                # ================= INCOMING VOTE EVENTS =================
                voteCasted-in-0:
                    destination: vote-casted
                    contentType: application/json
                    group: result-group

                # ================= INCOMING ELECTION CLOSED EVENTS =================
                electionClosed-in-0:
                    destination: election-closed
                    contentType: application/json
                    group: result-group

            kafka:
                binder:
                    brokers: localhost:9092
                    auto-create-topics: true

                    configuration:
                        spring.json.trusted.packages: com.online.voting.events

    main:
        allow-bean-definition-overriding: true

management:
    endpoints:
        web:
            exposure:
                include: health,info

    health:
        kafka:
            enabled: true

        db:
            enabled: true

logging:
    level:
        org.hibernate.SQL: DEBUG
        org.hibernate.type.descriptor.sql.BasicBinder: TRACE
        org.springframework.cloud.stream: DEBUG
        org.springframework.integration: DEBUG
        org.springframework.kafka: DEBUG
